<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="#16100B"/>
  <rect x="40" y="40" width="432" height="432" rx="72" fill="none" stroke="#C49A6C" stroke-opacity="0.35" stroke-width="4"/>
  <g filter="url(#glow)" font-family="Archivo Black, Arial Black, sans-serif" font-weight="900" text-anchor="middle">
    <text x="256" y="250" font-size="200" fill="#FFB52E">LC</text>
    <text x="256" y="360" font-size="56" fill="#FF4530" letter-spacing="8">LIVE</text>
  </g>
</svg>
